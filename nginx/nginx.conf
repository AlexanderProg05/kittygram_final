server {
    listen 80;
    server_tokens off;

    location /kittygram/static/ {
        alias /staticfiles/static/;
    }

    location /kittygram/media/ {
        alias /media/;
    }

    location /kittygram/api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $http_host;
    }

    location /kittygram/admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $http_host;
    }

    # Редирект для URL без слеша
    location = /kittygram {
        return 301 /kittygram/;
    }

    # Главный блок для SPA-маршрутов
    location /kittygram/ {
        alias /staticfiles/;
        index index.html;
        # Ключевое исправление: fallback на абсолютный путь
        try_files $uri $uri/ /staticfiles/index.html;
    }

    location / {
        return 404;
    }
}
