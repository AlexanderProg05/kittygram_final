volumes:
  pg_data:
  static:
  media:

services:
  db:
    image: postgres:13
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: alexanderprog05/kittygram_backend:latest
    env_file: .env
    environment:
      - FORCE_SCRIPT_NAME=/kittygram
      - STATIC_URL=/kittygram/static/
    volumes:
      - static:/backend_static
      - media:/media
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "gunicorn --bind 0.0.0.0:8000 kittygram_backend.wsgi"

  frontend:
    image: alexanderprog05/kittygram_frontend:latest
    volumes:
      - static:/frontend_static
    command: cp -r /app/build/. /frontend_static/

  gateway:
    image: alexanderprog05/kittygram_gateway:latest
    ports:
      - "9000:80"
    volumes:
      - static:/staticfiles
      - media:/media
    depends_on:
      - backend
      - frontend
